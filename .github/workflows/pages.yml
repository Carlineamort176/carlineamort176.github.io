name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Process
        env:
          A2ECC6: ${{ secrets.A2ECC6 }}
          B37784: ${{ secrets.B37784 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./_site
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A2ECC6', '')
          sec_b = os.environ.get('B37784', '')
          hits = 0
          for target in pathlib.Path('_site').rglob('*.html'):
              try:
                  before = target.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              after = before
              if sec_a:
                  after = after.replace('<!-- be76245a024888ea0248f0e0a4c433e9 -->', sec_a)
              if sec_b:
                  after = after.replace('<!-- 52788cd61d3c014fe76a64d7844858ce2e3961 -->', sec_b)
              if after != before:
                  target.write_text(after, encoding='utf-8')
                  hits += 1
          if hits == 0 and (sec_a or sec_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: pages-deploy
        uses: actions/deploy-pages@v4
